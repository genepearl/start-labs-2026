<section id="profiles" class="border-b pb-16 border-white/10 relative z-10" style="background:#0d0d14;">
  <div class="max-w-6xl mx-auto px-6 md:px-12 lg:px-24">
    
    <!-- Header -->
    <div class="mb-16 text-center">
      <h2 class="text-4xl md:text-6xl font-black tracking-tightest uppercase text-white">Two Profiles</h2>
      <span class="font-mono text-accent text-sm tracking-widest uppercase block mt-4">// Who are you?</span>
    </div>

    <!-- Cards row — side by side on desktop, stacked on mobile -->
    <div class="flex flex-col lg:flex-row items-stretch relative">

      <!-- divider + OR (desktop only) -->
      <div class="hidden lg:block absolute left-1/2 top-0 bottom-0 w-[1px] bg-white/10 -translate-x-1/2 z-10"></div>
      <div class="hidden lg:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-14 h-14 bg-[#0d0d14] border border-white/10 items-center justify-center z-20 font-mono text-accent text-xs tracking-widest">OR</div>

      <!-- Card A -->
      <div class="flex-1 p-8 lg:py-24 lg:pr-20 bg-white/[0.02] flex justify-center lg:justify-end group border border-white/10 lg:border-0">
        <div class="max-w-[420px] w-full">
          <div class="flex items-center gap-4 mb-8">
            <div class="h-px w-10 bg-white/10 group-hover:bg-accent transition-colors"></div>
            <span class="font-mono text-gray-500 text-[11px] uppercase tracking-[0.2em] group-hover:text-accent">Profile Type A</span>
          </div>
          <h2 class="text-3xl md:text-4xl font-black uppercase tracking-tight leading-tight mb-6 text-white group-hover:text-accent transition-colors">Healthcare<br>Partner</h2>
          <div class="font-mono text-xs text-white mb-8 uppercase tracking-[0.15em] border border-white/10 inline-block px-4 py-2 bg-black group-hover:border-white">Domain Expert</div>
          <p class="text-base text-gray-400 font-light leading-relaxed">Knows the problem inside out, but lacks the technical skills to build a solution.</p>
        </div>
      </div>

      <!-- Mobile OR divider -->
      <div class="flex lg:hidden items-center justify-center py-6 relative">
        <div class="absolute inset-x-0 top-1/2 h-px bg-white/10"></div>
        <div class="w-14 h-14 bg-[#0d0d14] border border-white/10 flex items-center justify-center z-10 font-mono text-accent text-xs tracking-widest">OR</div>
      </div>

      <!-- Card B -->
      <div class="flex-1 p-8 lg:py-24 lg:pl-20 flex justify-center lg:justify-start group border border-white/10 lg:border-0" style="background:#0d0d14;">
        <div class="max-w-[420px] w-full flex flex-col items-end text-right">
          <div class="flex items-center gap-4 mb-8">
            <span class="font-mono text-gray-500 text-[11px] uppercase tracking-[0.2em] group-hover:text-accent">Profile Type B</span>
            <div class="h-px w-10 bg-white/10 group-hover:bg-accent transition-colors"></div>
          </div>
          <h2 class="text-3xl md:text-4xl font-black uppercase tracking-tight leading-tight mb-6 text-white group-hover:text-accent transition-colors">The<br>Builder</h2>
          <div class="font-mono text-xs text-white mb-8 uppercase tracking-[0.15em] border border-white/10 inline-block px-4 py-2 bg-white/[0.03] group-hover:border-white">Technical Talent</div>
          <p class="text-base text-gray-400 font-light leading-relaxed">Knows how to build fast, but struggles to find a problem worth solving.</p>
        </div>
      </div>

    </div>
  </div>
</section>
